summary = Hermes + OpenCode Desktop Accessibility
description = """Merged add-on: message navigation, session switching, @-reference picker, and auto-read for the Hermes Agent and OpenCode Desktop apps. Hotkeys are foreground-aware; the same key does the right thing in each app. NVDA+Alt+Up/Down/Home/End navigate messages; NVDA+Alt+S opens a session picker; NVDA+Alt+Shift+D reports foreground metadata. 2.1.0: self-healing Hermes app.asar patcher with audible failure announcements — survives Hermes updates that previously broke session switching."""
